services:
  - type: web
    name: safebank
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: safebank-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: safebank-db
    databaseName: safebank
    plan: free
    